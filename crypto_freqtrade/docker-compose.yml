services:
  freqtrade:
    image: freqtradeorg/freqtrade:2024.5
    restart: unless-stopped
    container_name: freqtrade-crypto-pullback-dryrun
    volumes:
      - ./user_data:/freqtrade/user_data
    ports:
      - "127.0.0.1:8082:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --config /freqtrade/user_data/config/config.json
      --strategy PullbackTrendReclaim

